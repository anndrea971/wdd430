<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project | wdd430 </title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#F8FAFC',   
                        secondary: '#0F172A', 
                        accent: '#0284C7',    
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-50 min-h-screen flex flex-col transition-colors duration-200">

    <header class="sticky top-0 z-40 w-full backdrop-blur border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-xl font-bold tracking-tight text-sky-600 dark:text-sky-400">SoloDev</span>
                <span class="text-xs bg-slate-200 dark:bg-slate-800 px-2 py-1 rounded font-mono">W02</span>
            </div>
            
            <nav class="hidden md:flex items-center gap-6 font-medium text-sm text-slate-600 dark:text-slate-300">
                <a href="#" class="hover:text-sky-600 dark:hover:text-sky-400 transition">Dashboard</a>
                <a href="#" class="hover:text-sky-600 dark:hover:text-sky-400 transition">Items</a>
                <a href="#" class="hover:text-sky-600 dark:hover:text-sky-400 transition">Analytics</a>
            </nav>

            <div class="flex items-center gap-4">
                <!-- Dark Mode Toggle Button -->
                <button id="theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:ring-2 hover:ring-slate-300 dark:hover:ring-slate-700 transition" aria-label="Toggle Dark Mode">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <section class="mb-8 flex flex-col sm:flex-row gap-4 items-center justify-between">
            <div class="w-full sm:max-w-xs relative">
                <input type="text" id="search-bar" placeholder="Search items..." class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
            </div>
            <div class="text-sm text-slate-500 dark:text-slate-400">
                Showing <span id="item-count" class="font-semibold text-slate-800 dark:text-slate-200">0</span> items
            </div>
        </section>

        <div id="loading-spinner" class="flex flex-col items-center justify-center py-20 gap-4">
            <div class="w-12 h-12 border-4 border-sky-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-slate-500 text-sm animate-pulse">Fetching records from server...</p>
        </div>

        <section id="item-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 hidden">

        </section>

        <div id="no-results" class="text-center py-20 hidden">
            <p class="text-slate-500 dark:text-slate-400 text-lg">No records match your search filter.</p>
        </div>
    </main>


    <footer class="border-t border-slate-200 dark:border-slate-800 py-6 text-center text-xs text-slate-400">
        <p>© 2026 Solo Project Assignment. Designed with Tailwind CSS.</p>
    </footer>

    <div id="detail-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="bg-white dark:bg-slate-800 w-full max-w-lg rounded-xl shadow-2xl overflow-hidden transform scale-95 transition-transform duration-200">
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <h3 id="modal-title" class="text-xl font-bold text-slate-900 dark:text-white">Item Title</h3>
                    <button id="close-modal" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 font-bold text-xl">&times;</button>
                </div>
                <p id="modal-category" class="text-xs font-semibold uppercase tracking-wider text-sky-600 dark:text-sky-400 mb-2">Category</p>
                <p id="modal-description" class="text-slate-600 dark:text-slate-300 text-sm leading-relaxed mb-6">Detailed description goes here...</p>
                <div class="flex justify-between items-center pt-4 border-t border-slate-100 dark:border-slate-700">
                    <span id="modal-metric" class="text-lg font-bold text-slate-900 dark:text-white">$0.00</span>
                    <button class="px-4 py-2 bg-sky-600 hover:bg-sky-700 text-white text-sm font-semibold rounded-lg transition shadow-md shadow-sky-600/20">Acknowledge Action</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js" type="module"></script>
</body>
</html>
